<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>emon2358</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@900&family=Roboto+Mono&display=swap"
      rel="stylesheet"
    />
    <style>
      body,
      html {
        height: 100%;
        margin: 0;
        font-family: "Roboto Mono", monospace;
        color: #0f0;
        background-color: #000;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .bg {
        background-image: url("https://i.pinimg.com/originals/74/b2/fc/74b2fc26f7536e063096991488fdd23a.jpg");
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-position: center;
        background-repeat: no-repeat;
        background-size: cover;
        z-index: -1;
      }
      .content {
        text-align: center;
        z-index: 1;
      }
      .user-icon-container {
        position: relative;
        display: inline-block;
      }
      .user-icon {
        width: 150px;
        height: 150px;
        border-radius: 50%;
        overflow: hidden;
        box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
        cursor: pointer;
        transition: transform 0.3s ease;
      }
      .user-icon:hover {
        transform: scale(1.1);
      }
      .user-icon img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .slide-text {
        position: absolute;
        left: -220px;
        top: 50%;
        transform: translateY(-50%);
        background-color: rgba(0, 0, 0, 0.8);
        padding: 15px;
        border-radius: 10px;
        opacity: 0;
        transition: opacity 0.3s, transform 0.3s;
        pointer-events: none;
        width: 200px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        border: 1px solid #0f0;
      }
      .user-icon-container.active .slide-text {
        opacity: 1;
        pointer-events: auto;
        animation: glitchAnimation 0.5s ease-out;
      }
      @keyframes glitchAnimation {
        0% {
          clip-path: inset(0 0 0 0);
          transform: translateY(-50%) translateX(20px);
        }
        20% {
          clip-path: inset(33% 0 66% 0);
          transform: translateY(-50%) translateX(10px);
        }
        40% {
          clip-path: inset(66% 0 33% 0);
          transform: translateY(-50%) translateX(5px);
        }
        60% {
          clip-path: inset(33% 0 66% 0);
          transform: translateY(-50%) translateX(2px);
        }
        80% {
          clip-path: inset(66% 0 33% 0);
          transform: translateY(-50%) translateX(1px);
        }
        100% {
          clip-path: inset(0 0 0 0);
          transform: translateY(-50%) translateX(0);
        }
      }
      .emon {
        font-family: "Noto Serif JP", serif;
        font-size: 36px;
        margin-bottom: 10px;
        text-align: center;
      }
      .links {
        display: flex;
        justify-content: space-around;
      }
      .links a {
        color: #0f0;
        text-decoration: none;
        font-size: 18px;
        transition: color 0.3s;
      }
      .links a:hover {
        color: #0ff;
      }
      .typing-text {
        font-size: 24px;
        margin-top: 20px;
        height: 60px;
      }
      .clock {
        font-size: 36px;
        margin-top: 20px;
        text-shadow: 0 0 10px #0f0;
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }
      .cursor {
        display: inline-block;
        width: 10px;
        height: 24px;
        background-color: #0f0;
        margin-left: 5px;
        animation: blink 0.7s infinite;
      }
    </style>
  </head>
  <body>
    <div class="bg"></div>
    <div class="content">
      <div class="user-icon-container" id="iconContainer">
        <div class="user-icon">
          <img
            src="https://i.pinimg.com/736x/b3/c9/6a/b3c96a3e8bbcb74598049e76c1bb5367.jpg"
            alt="User Icon"
          />
        </div>
        <div class="slide-text">
          <div class="emon">衛門</div>
          <div class="links">
            <a href="https://github.com/emon2358" target="_blank">emon2358</a>
            <a href="https://www.youtube.com/@unk_893" target="_blank">l1nda</a>
          </div>
        </div>
      </div>
      <div class="typing-text">
        I'm<br />
        <span id="typingText"></span><span class="cursor"></span>
      </div>
      <div class="clock" id="localClock"></div>
    </div>

    <script>
      const iconContainer = document.getElementById("iconContainer");
      iconContainer.addEventListener("click", function () {
        this.classList.toggle("active");
      });

      const texts = ["python developer", "chat gpt prompt creater"];
      let textIndex = 0;
      let charIndex = 0;
      const typingElement = document.getElementById("typingText");

      function typeText() {
        if (charIndex < texts[textIndex].length) {
          if (Math.random() < 0.1) {
            // 10% chance for a glitch
            typingElement.innerHTML += `<span style="color: #f00;">${texts[textIndex][charIndex]}</span>`;
          } else {
            typingElement.innerHTML += texts[textIndex][charIndex];
          }
          charIndex++;
          setTimeout(typeText, 100);
        } else {
          setTimeout(eraseText, 2000);
        }
      }

      function eraseText() {
        if (charIndex > 0) {
          typingElement.innerHTML = texts[textIndex].substring(
            0,
            charIndex - 1
          );
          charIndex--;
          setTimeout(eraseText, 50);
        } else {
          textIndex = (textIndex + 1) % texts.length;
          setTimeout(typeText, 500);
        }
      }

      typeText();

      function updateClock() {
        const now = new Date();
        const clockElement = document.getElementById("localClock");
        const hours = now.getHours().toString().padStart(2, "0");
        const minutes = now.getMinutes().toString().padStart(2, "0");
        const seconds = now.getSeconds().toString().padStart(2, "0");

        clockElement.textContent = `${hours}:${minutes}:${seconds}`;
      }

      updateClock();
      setInterval(updateClock, 1000);
    </script>
  </body>
</html>
